<p class="hint" id="hint"></p>
</div>
<div class="card">
<form method="POST" action="/save">
<label>Network (SSID)</label>
<input type="text" name="ssid" id="ssid" placeholder="Tap a network above" required>
<label>Password</label>
<div class="pw">
<input type="password" name="password" id="pw" placeholder="Enter password">
<button type="button" class="eye" id="eyebtn" onclick="
var p=document.getElementById('pw');
p.type=p.type=='password'?'text':'password';
this.textContent=p.type=='password'?'Show':'Hide'">Show</button>
</div>
<button class="btn pri" type="submit" style="margin-top:16px">Connect</button>
</form>
<button class="btn sec" id="hiddenbtn" onclick="toggleHidden(this)">Show hidden networks</button>
<a class="btn sec" href="/wifi/refresh">↺ Refresh networks</a>
<a class="btn sec" href="/">← Back to menu</a>
</div>
<script>
function sel(el,s){
  document.querySelectorAll('.net').forEach(function(n){n.classList.remove('sel')});
  el.classList.add('sel');
  document.getElementById('ssid').value=s;
  document.getElementById('hint').textContent='Selected: '+s;
}
function selHidden(el){
  document.querySelectorAll('.net').forEach(function(n){n.classList.remove('sel')});
  el.classList.add('sel');
  document.getElementById('ssid').value='';
  document.getElementById('hint').textContent='Type the SSID for this hidden network';
  document.getElementById('ssid').focus();
}
function toggleHidden(btn){
  var nets=document.querySelectorAll('.hnet');
  var show=nets[0]&&nets[0].style.display==='none';
  nets.forEach(function(n){n.style.display=show?'flex':'none'});
  btn.textContent=show?'Hide hidden networks':'Show hidden networks';
}
</script>
</body></html>
